<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✏️ 브라우저 탭에 표시될 이름입니다 -->
  <title>홍길동의 자기소개</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="card">

    <!-- ✏️ 원하는 이모티콘으로 바꿔보세요 (🐣 🌱 🎧 🐈 🍀 ...) -->
    <div class="avatar">🐣</div>

    <!-- ✏️ 여기에 본인 이름 -->
    <h1>홍길동</h1>

    <!-- ✏️ 나를 한 줄로 표현한다면? -->
    <p class="tagline">코딩을 막 시작한 사람입니다</p>

    <hr>

    <h2>소개</h2>
    <!-- ✏️ 자유롭게 적어보세요. 두세 문장이면 충분합니다 -->
    <p>
      안녕하세요! 저는 웹 개발을 배우고 있습니다.
      이 페이지는 제가 직접 만들어서 인터넷에 올린 첫 번째 페이지예요.
      앞으로 조금씩 고쳐 나갈 예정입니다.
    </p>

    <h2>좋아하는 것</h2>
    <!-- ✏️ 줄을 지우거나 늘려도 됩니다 -->
    <ul>
      <li>☕ 카페에서 코드 쓰기</li>
      <li>🎵 작업할 때 듣는 플레이리스트</li>
      <li>🐈 고양이 영상 보기</li>
    </ul>

    <h2>연락처</h2>
    <!-- ✏️ 주소를 본인 것으로 바꾸세요. 없는 항목은 줄째로 지우면 됩니다 -->
    <div class="links">
      <a href="https://github.com/아이디">GitHub</a>
      <a href="mailto:내이메일@example.com">이메일</a>
    </div>

  </main>

  <!-- 방명록 -->
  <section class="card guestbook">

    <h2>방명록</h2>
    <p class="gb-lead">다녀가셨다면 한마디 남겨주세요.</p>

    <form class="gb-form" id="gb-form">
      <input type="text" id="gb-name" placeholder="이름" maxlength="20" required>
      <textarea id="gb-message" placeholder="한마디 남겨주세요 (200자까지)" maxlength="200" rows="3" required></textarea>
      <div class="gb-row">
        <span class="gb-count" id="gb-count">0 / 200</span>
        <button type="submit" id="gb-submit">남기기</button>
      </div>
    </form>

    <p class="gb-status" id="gb-status" role="status" hidden></p>

    <ul class="gb-list" id="gb-list"></ul>

  </section>

  <script type="module" src="guestbook.js"></script>

</body>
</html>
